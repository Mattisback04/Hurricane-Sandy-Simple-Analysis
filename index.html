<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hurricane Sandy Analysis</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #5D1725; /* MSU Maroon */
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        h2 {
            color: darkslateblue;
            margin-top: 10px;
        }
        .gif-container {
            margin: 20px auto;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>Hurricane Sandy (2012) - Meteorological Analysis</h1>
    <p class="subtitle">A synoptic overview using Matplotlib and Cartopy.</p>

    <div class="gif-container">
        <h2>Mean Sea Level Pressure & Winds</h2>
        <img src="Hurricane%20Sandy%20Analysis:%20Images%20and%20GIFs/GIFs/MSLP%20&%20Winds%20GIF.gif" alt="MSLP and Winds Animation">
    </div>

    <div class="gif-container">
        <h2>Radar Reflectivity</h2>
        <img src="Hurricane%20Sandy%20Analysis:%20Images%20and%20GIFs/GIFs/Radar%20Reflectivity%20GIF.gif" alt="Radar Reflectivity Animation">
    </div>

    <div class="gif-container">
        <h2>Geopotential Height & Moisture</h2>
        <img src="Hurricane%20Sandy%20Analysis:%20Images%20and%20GIFs/GIFs/Sandy%20GH%20&%20Moisture.gif" alt="Geopotential Height Animation">
    </div>

</body>
</html>
